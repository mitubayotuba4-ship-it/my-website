<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人のお客様お問い合わせ | TechAcademy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-graduation-cap"></i> TechAcademy
            </a>
            <nav class="nav">
                <a href="index.html">トップページへ戻る</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h1 class="page-title">個人のお客様</h1>
                <p class="page-subtitle">無料カウンセリング、コースに関するご相談はこちらから</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="form-container">
                    <form action="#" method="POST">
                        <div class="form-group">
                            <label class="form-label" for="name">お名前 <span class="form-required">*</span></label>
                            <input type="text" id="name" name="name" class="form-control" required placeholder="山田 太郎">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="email">メールアドレス <span class="form-required">*</span></label>
                            <input type="email" id="email" name="email" class="form-control" required placeholder="example@example.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="course">興味のあるコース</label>
                            <select id="course" name="course" class="form-control">
                                <option value="">選択してください</option>
                                <option value="web">Webアプリケーション開発コース</option>
                                <option value="ai">AI & データサイエンスコース</option>
                                <option value="design">UI/UXデザインコース</option>
                                <option value="undecided">まだ決まっていない / 相談したい</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="message">お問い合わせ内容 <span class="form-required">*</span></label>
                            <textarea id="message" name="message" class="form-control" required placeholder="ご相談内容やご質問をご自由にご記入ください。"></textarea>
                        </div>
                        <div style="text-align: center; margin-top: 40px;">
                            <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">送信する</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top: none; padding-top: 0;">
                <p>&copy; 2026 TechAcademy. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
